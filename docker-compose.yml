version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - school-net

  students-mvc:
    build:
      context: ./students-mvc
    container_name: students-mvc
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SchoolDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
    networks:
      - school-net

  grades-mvc:
    build:
      context: ./grades-mvc
    container_name: grades-mvc
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SchoolDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
      - StudentsServiceUrl=http://students-mvc:8080
    depends_on:
      - sqlserver
      - students-mvc
    networks:
      - school-net

volumes:
  sqldata:

networks:
  school-net:
    driver: bridge
